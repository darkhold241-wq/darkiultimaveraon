name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create assets directory
        run: mkdir -p app/src/main/assets/model

      - name: Download Vosk model
        run: |
          wget -q "https://alphacephei.com/vosk/models/vosk-model-small-es-0.42.zip" -O vosk-model.zip
          unzip -q vosk-model.zip
          cp -r vosk-model-small-es-0.42/* app/src/main/assets/model/
          rm -rf vosk-model.zip vosk-model-small-es-0.42

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: darki-release-apk
          path: app/build/outputs/apk/debug/app-debug.apk
